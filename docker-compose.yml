version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: edt_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
      MYSQL_DATABASE: edt
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edt_network

  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edt_tomcat
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      - JAVA_OPTS=-Dfile.encoding=UTF-8
    networks:
      - edt_network
    volumes:
      - ./logs:/usr/local/tomcat/logs

networks:
  edt_network:

volumes:
  mysql_data:

